#
# The line above is automatically updated based on what tables are selected in the GUI.
# If it gets modified by hand, it will be overwritten on the next edit.

# If you want to use any example, just remove the comment character (#).


# If you want to override or add any filter to any of the selected tables, specify them in the section similar to the one in table deffinition:
#[filters.table_name]
# Here you can specify the same stuff as in the table filter section.


# If you include multiple tables it is required to merge them somehow. For this the post_processing section is used.
#[post_processing]
# Here you can specify how to merge the tables and a couple other things.

#join_type = "sum" # This join type is used for summing the tables by some series specified by merge_serie
#join_type = "ratio" # This one is used for dividing values of one table by the values of another table
#join_type = "merge" # This one merges the tables by some series next to each other.

#merge_serie = "year" # This is required when using any join type, it specifies the series by which the join is happening
# For example, if you have two tables with same countries but one is for RU and other for UAS for example, you can specify "country" here and
# it will sum the values of each country, or place the countries next to each other. For the ratio join, the "year" would be better suited,
# because we want to divide the values in each year, not do anything with countries as a whole.

#ratio_first = "table1" # This is required when using join type ratio, it specifies which table's values are used as the numerators.
#ratio_second = "table2" # Similar as above, it specifies which table's values are used as the denominators.

#reverse = "year" # This is used to reverse the order of the values in the specified series
#reverse = ["year", "country"] # You can also specify multiple series to reverse, just put them in a list like this

#diff_serie = "year" # This is used on a single table to calculate the difference between the first and last value in the specified series.


[graph]
# Here specify the type of graph and other settings affecting the visualization.
# Everything, except the type, is optional and has some default value.

# Some options apply to all graphs

#width = 12 # The width of the graph in inches, default is 10
#height = 8 # The height of the graph in inches, default is 6
#title = "Example graph" # The title that appears on top of the graph, default empty
#color_palette = ["blue", "orange", "green"] # It is possible to specify the colors in words like this, but there are not many and they don't look good
#color_palette = ["#1f77b4", "#ff7f0e", "#2ca02c"] # It is better to specify the colors in hex, you can use any hex code (online tools can help with picking)
#legend_visibility = false # Whether to show the legend, default is true, if there are more than one series
#legend_position = "upper right" # The position of the legend, default is automatic, other options are: upper left, lower left, lower right, right, center left, center right, lower center, upper center, center


# Many things depend on the type, just uncomment one that you want.
#type = "bar"
#type = "line"
#type = "pie"
#type = "spider"
#type = "box"
#type = "histogram"

# Unless the selected data is a single series, you need to specify where should which column or row header be used.
# Since the most dimensions the generator can generate is 3, there are three levels: x_axis, color and style
# The names are derived mostly from line plot, because you first specify what series goes along the x axis, then the different series
# is distinguished by some color and the last dimension is line style. These names apply to all graph types, just specify them in the right order.

# In a bar graph, the x axis is the different bars and the color is the different groups of bars. There is no style for bar graph.
# In pie graph is only one series, nothing is necessary
# In spider graph, the x axis is the different axes and the color are the different lines
# In box graph, the x axis is the different boxes and there is no color or style.
# Histogram is only one series, nothing is necessary

# For example, if you want to make a line graph with years on x axis, countries by color and style of the line to indicate the type of data:
#x_axis = "year"
#color = "country"
#style = "type"
# (assuming that the data has columns named year, country and type)

# The following options are specific to bar, line, box and histogram graphs
#x_axis_label = "Year" # The label of the x axis, default empty
#y_axis_label = "Value" # The label of the y axis, default empty
#x_ticks_rotation = 45 # The rotation of the x axis ticks in degrees counterclockwise, default is 0
#highlight = 100 # A horizontal line will be drawn at this value, default is no line
#min = 0 # The minimum value where the y axis will start, default is automatically determined
#max = 200 # The maximum value where the y axis will end, default is automatically determined
